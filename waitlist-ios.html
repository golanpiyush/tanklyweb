<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Tankly for iOS — Join the Waitlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #03080f;
      --cyan:   #00e5ff;
      --purple: #a855f7;
      --teal:   #06b6d4;
      --green:  #10b981;
      --red:    #ef4444;
      --muted:  #4a6a80;
      --text:   #9bbfd4;
      --white:  #eef6ff;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      background:var(--bg);
      font-family:'DM Sans',sans-serif;
      color:var(--text);
      display:flex;align-items:center;justify-content:center;
      min-height:100svh;
      overflow:hidden;
      cursor:none;
    }

    /* ── Cursor ── */
    .cursor-dot,.cursor-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999}
    .cursor-dot{width:5px;height:5px;background:var(--cyan);top:-2.5px;left:-2.5px}
    .cursor-ring{width:28px;height:28px;border:1px solid rgba(0,229,255,0.45);top:-14px;left:-14px;transition:transform .1s ease}

    /* ── Deep-sea bubbles ── */
    .bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .b{
      position:absolute;bottom:-60px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%,rgba(0,229,255,0.6),rgba(0,229,255,0.02));
      border:1px solid rgba(0,229,255,0.15);
      animation:rise linear infinite;
    }
    /* varied sizes + positions + speeds */
    .b:nth-child(1) {width:5px;height:5px;left:4%;animation-duration:19s;animation-delay:0s;opacity:.7}
    .b:nth-child(2) {width:9px;height:9px;left:11%;animation-duration:26s;animation-delay:3s;opacity:.5}
    .b:nth-child(3) {width:4px;height:4px;left:19%;animation-duration:15s;animation-delay:7s;opacity:.6}
    .b:nth-child(4) {width:13px;height:13px;left:26%;animation-duration:32s;animation-delay:1s;opacity:.35}
    .b:nth-child(5) {width:6px;height:6px;left:34%;animation-duration:21s;animation-delay:9s;opacity:.65}
    .b:nth-child(6) {width:3px;height:3px;left:42%;animation-duration:17s;animation-delay:4s;opacity:.8}
    .b:nth-child(7) {width:10px;height:10px;left:50%;animation-duration:24s;animation-delay:12s;opacity:.4}
    .b:nth-child(8) {width:7px;height:7px;left:58%;animation-duration:20s;animation-delay:2s;opacity:.6}
    .b:nth-child(9) {width:4px;height:4px;left:66%;animation-duration:16s;animation-delay:8s;opacity:.7}
    .b:nth-child(10){width:12px;height:12px;left:74%;animation-duration:28s;animation-delay:5s;opacity:.3}
    .b:nth-child(11){width:6px;height:6px;left:81%;animation-duration:22s;animation-delay:10s;opacity:.55}
    .b:nth-child(12){width:8px;height:8px;left:89%;animation-duration:18s;animation-delay:6s;opacity:.5}
    .b:nth-child(13){width:3px;height:3px;left:95%;animation-duration:14s;animation-delay:11s;opacity:.75}
    @keyframes rise{
      0%{transform:translateY(0) translateX(0);opacity:0}
      6%{opacity:inherit}
      90%{opacity:inherit}
      100%{transform:translateY(-105vh) translateX(18px);opacity:0}
    }

    /* ── Glow orb behind form ── */
    .glow-orb{
      position:fixed;width:600px;height:600px;border-radius:50%;
      background:radial-gradient(circle,rgba(0,229,255,0.04) 0%,transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);
      pointer-events:none;z-index:0;
      animation:glowPulse 8s ease-in-out infinite;
    }
    @keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}

    /* ── Main content ── */
    .stage{
      position:relative;z-index:10;
      width:100%;max-width:420px;
      padding:0 1.5rem;
      display:flex;flex-direction:column;align-items:center;
      text-align:center;
    }

    /* Apple logo mark */
    .apple-mark{
      width:52px;height:52px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:15px;
      display:flex;align-items:center;justify-content:center;
      font-size:26px;margin-bottom:2rem;
      box-shadow:0 0 30px rgba(0,229,255,0.1);
      animation:markFloat 5s ease-in-out infinite;
    }
    @keyframes markFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    /* Platform tag */
    .platform-tag{
      display:inline-flex;align-items:center;gap:7px;
      border:1px solid rgba(0,229,255,0.2);
      background:rgba(0,229,255,0.05);
      border-radius:999px;padding:4px 13px;
      font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
      color:var(--cyan);margin-bottom:1.8rem;
    }
    .platform-tag-dot{width:4px;height:4px;background:var(--cyan);border-radius:50%;animation:pulse 2s ease infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Headline */
    .headline{
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:clamp(2rem,8vw,2.8rem);
      color:var(--white);line-height:1.05;
      margin-bottom:1rem;letter-spacing:-.02em;
    }
    .headline .grad{
      background:linear-gradient(95deg,var(--cyan),var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* Date pill */
    .date-chip{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);
      border-radius:10px;padding:7px 14px;margin-bottom:1.6rem;
      font-size:12px;font-weight:600;color:#c084fc;
    }
    .date-chip svg{width:13px;height:13px;flex-shrink:0}

    /* Sub */
    .sub{
      font-size:14px;color:var(--muted);
      line-height:1.75;max-width:320px;margin:0 auto 2rem;
    }

    /* Form */
    .form-wrap{width:100%}
    .email-row{
      display:flex;gap:.5rem;margin-bottom:.9rem;
    }
    .email-input{
      flex:1;background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:.9rem;padding:.85rem 1rem;
      font-size:.9rem;color:var(--white);
      font-family:'DM Sans',sans-serif;outline:none;
      transition:border-color .2s,box-shadow .2s;
      min-width:0;
    }
    .email-input::placeholder{color:var(--muted)}
    .email-input:focus{
      border-color:rgba(0,229,255,0.5);
      box-shadow:0 0 0 3px rgba(0,229,255,0.08);
    }
    .join-btn{
      background:linear-gradient(115deg,var(--cyan),var(--teal));
      border:none;border-radius:.9rem;padding:.85rem 1.4rem;
      font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;
      color:#021c18;cursor:pointer;transition:all .25s;white-space:nowrap;
      box-shadow:0 8px 24px -4px rgba(0,229,255,0.35);
      display:flex;align-items:center;gap:.4rem;flex-shrink:0;
    }
    .join-btn:hover:not(:disabled){transform:scale(1.03);box-shadow:0 12px 30px -4px rgba(0,229,255,0.5)}
    .join-btn:active:not(:disabled){transform:scale(0.97)}
    .join-btn:disabled{opacity:.6;cursor:not-allowed}

    /* Eager checkbox */
    .eager-row{
      display:flex;align-items:flex-start;gap:.7rem;
      background:rgba(168,85,247,0.05);
      border:1px solid rgba(168,85,247,0.15);
      border-radius:.8rem;padding:.8rem 1rem;
      cursor:pointer;text-align:left;
      transition:border-color .2s,background .2s;
      margin-bottom:1rem;
    }
    .eager-row:hover{border-color:rgba(168,85,247,0.35);background:rgba(168,85,247,0.08)}
    .eager-row input[type=checkbox]{
      appearance:none;-webkit-appearance:none;
      width:18px;height:18px;flex-shrink:0;margin-top:1px;
      border:1.5px solid rgba(168,85,247,0.4);
      border-radius:5px;background:transparent;cursor:pointer;
      transition:all .2s;position:relative;
    }
    .eager-row input[type=checkbox]:checked{
      background:linear-gradient(135deg,var(--purple),#7c3aed);
      border-color:var(--purple);
    }
    .eager-row input[type=checkbox]:checked::after{
      content:'✓';position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      color:white;font-size:11px;font-weight:700;
    }
    .eager-label{font-size:.8rem;color:var(--text);line-height:1.5}
    .eager-label strong{color:#c084fc;font-weight:600}

    /* Spinner */
    .btn-spinner{
      width:14px;height:14px;border:2px solid transparent;
      border-top-color:currentColor;border-radius:50%;
      animation:spin .7s linear infinite;display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Messages */
    .msg{
      font-size:.82rem;font-weight:600;padding:.7rem 1rem;
      border-radius:.7rem;text-align:center;display:none;margin-top:.2rem;
    }
    .msg.ok{background:rgba(16,185,129,0.1);border:1px solid var(--green);color:#6ee7b7;display:block}
    .msg.err{background:rgba(239,68,68,0.1);border:1px solid var(--red);color:#fca5a5;display:block}

    /* Count */
    .count-strip{
      margin-top:2rem;display:flex;align-items:center;gap:.5rem;
      font-size:11px;color:var(--muted);letter-spacing:.04em;
    }
    .count-dots{display:flex;gap:3px}
    .count-dot{
      width:20px;height:20px;border-radius:50%;
      border:1.5px solid rgba(0,229,255,0.2);
      background:rgba(0,229,255,0.06);
      display:flex;align-items:center;justify-content:center;
      font-size:9px;
    }

    @media(max-width:400px){
      .headline{font-size:1.9rem}
      .email-row{flex-direction:column}
      .join-btn{width:100%;justify-content:center}
    }
  </style>
</head>
<body>

<div class="cursor-dot" id="cd"></div>
<div class="cursor-ring" id="cr"></div>

<div class="bubbles">
  <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
  <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
  <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
  <div class="b"></div>
</div>
<div class="glow-orb"></div>

<div class="stage">

  <div class="apple-mark">🍎</div>

  <div class="platform-tag"><span class="platform-tag-dot"></span>iOS · Coming Soon</div>

  <h1 class="headline">
    Tankly,<br>
    <span class="grad">for iPhone.</span>
  </h1>

  <div class="date-chip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    November 2026
  </div>

  <p class="sub">
    The aquarium tracker you know on Android — reimagined for iOS. Same powerful parameter logging, AI insights, and community. Built for iPhone from the ground up.
  </p>

  <div class="form-wrap">

    <!-- Eager checkbox -->
    <label class="eager-row" id="eagerRow">
      <input type="checkbox" id="eagerCheck"/>
      <span class="eager-label">
        <strong>I'm eagerly waiting</strong> — notify me the moment it launches, and give me early access if possible.
      </span>
    </label>

    <div class="email-row">
      <input
        class="email-input"
        id="emailInput"
        type="email"
        placeholder="your@email.com"
        autocomplete="email"
        inputmode="email"
      />
      <button class="join-btn" id="joinBtn">
        <span id="joinText">Notify me</span>
        <div class="btn-spinner" id="joinSpinner"></div>
      </button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <div class="count-strip">
    <div class="count-dots">
      <div class="count-dot">🐠</div>
      <div class="count-dot">🐡</div>
      <div class="count-dot">🦈</div>
    </div>
    <span id="countText">Join the waitlist</span>
  </div>

</div>

<script>
(function(){
  // Cursor
  const cd=document.getElementById('cd'),cr=document.getElementById('cr');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.transform=`translate(${mx}px,${my}px)`});
  (function raf(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;cr.style.transform=`translate(${rx}px,${ry}px)`;requestAnimationFrame(raf)})();

  // Config — injected by build.js
  const SB_URL  = '__SUPABASE_URL__';
  const SB_ANON = '__SUPABASE_ANON_KEY__';

  const emailInput = document.getElementById('emailInput');
  const joinBtn    = document.getElementById('joinBtn');
  const joinText   = document.getElementById('joinText');
  const joinSpinner= document.getElementById('joinSpinner');
  const eagerCheck = document.getElementById('eagerCheck');
  const msg        = document.getElementById('msg');
  const countText  = document.getElementById('countText');

  // Load count on init
  loadCount();

  async function loadCount(){
    try{
      const res=await fetch(`${SB_URL}/rest/v1/ios_waitlist?select=id`,{
        headers:{
          'apikey':SB_ANON,
          'Authorization':`Bearer ${SB_ANON}`,
          'Prefer':'count=exact',
          'Range':'0-0',
        },
      });
      const count=res.headers.get('Content-Range');
      if(count){
        const total=count.split('/')[1];
        if(total&&total!=='*') countText.textContent=`${Number(total).toLocaleString()} people waiting`;
      }
    } catch(_){}
  }

  joinBtn.addEventListener('click',async()=>{
    const email=emailInput.value.trim();
    if(!email||!email.includes('@')||!email.includes('.')){
      showMsg('Please enter a valid email address.','err');
      emailInput.focus();
      return;
    }

    joinText.style.opacity='.5';joinSpinner.style.display='inline-block';joinBtn.disabled=true;
    msg.className='msg';msg.style.display='none';

    const isEager=eagerCheck.checked;
    const tier=isEager?'eager':'normal';

    try{
      const res=await fetch(`${SB_URL}/rest/v1/ios_waitlist`,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SB_ANON,
          'Authorization':`Bearer ${SB_ANON}`,
          'Prefer':'return=minimal',
        },
        body:JSON.stringify({
          email,
          tier,
          signed_up_at:new Date().toISOString(),
        }),
      });

      if(res.status===409){
        // already on list
        showMsg('You\'re already on the list! We\'ll be in touch.','ok');
        return;
      }
      if(!res.ok){
        const e=await res.json().catch(()=>({}));
        throw new Error(e.message||`HTTP ${res.status}`);
      }

      // Success
      const successMsg = isEager
        ? '🎉 You\'re in as an eager waiter! We\'ll reach out first.'
        : '✅ You\'re on the list! We\'ll notify you when iOS launches.';
      showMsg(successMsg,'ok');
      emailInput.value='';
      eagerCheck.checked=false;
      loadCount();

    } catch(err){
      console.error(err);
      showMsg('Something went wrong. Please try again.','err');
    } finally{
      joinText.style.opacity='1';joinSpinner.style.display='none';joinBtn.disabled=false;
    }
  });

  // Enter key submit
  emailInput.addEventListener('keydown',e=>{if(e.key==='Enter')joinBtn.click()});

  function showMsg(text,type){
    msg.textContent=text;msg.className=`msg ${type}`;
    if(type==='ok') setTimeout(()=>{msg.className='msg';msg.style.display='none'},7000);
  }
})();
</script>
</body>
</html>
